name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: prosperity
          POSTGRES_USER: prosperity
          POSTGRES_PASSWORD: prosperity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prosperity"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build and verify (compile + test + checkstyle + spotless + jacoco)
        run: cd backend && ./mvnw verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/prosperity
          SPRING_DATASOURCE_USERNAME: prosperity
          SPRING_DATASOURCE_PASSWORD: prosperity
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Lint
        run: cd frontend && pnpm lint
      - name: Format check
        run: cd frontend && pnpm format:check
      - name: Build
        run: cd frontend && pnpm build
