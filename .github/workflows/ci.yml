name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: prosperity_test
          POSTGRES_USER: prosperity
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prosperity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: prosperity-api

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Java 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn verify -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/prosperity_test
          SPRING_DATASOURCE_USERNAME: prosperity
          SPRING_DATASOURCE_PASSWORD: test_password

  frontend:
    name: Frontend (Node 22 + SvelteKit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: prosperity-web

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: prosperity-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate i18n messages
        run: npx paraglide-js compile --project ./project.inlang --outdir ./src/lib/i18n

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
