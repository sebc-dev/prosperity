name: nightly

# Mirrors docs/Stratégie de tests §9.3: 30-45 min budget, daily cron.
# Manually re-runnable via workflow_dispatch (used to satisfy the
# acceptance criterion "vert au moins une fois" without waiting for cron).

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  backend-property-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HYPOTHESIS_PROFILE: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/

  audit-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run --with pip-audit pip-audit

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run pytest --cov --cov-report=xml --cov-report=html --cov-report=term
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  # Placeholders surfaced in CI so the gap is visible; activated in V1
  # (cf. docs/Stratégie de tests §6 and §4.7).
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "placeholder — Playwright 5 parcours (V1, stratégie de tests §6)"

  banking-contract-level-c:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "placeholder — Enable Banking niveau C live calls (V1, stratégie de tests §4.7)"
