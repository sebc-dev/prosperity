name: nightly

# Mirrors docs/Stratégie de tests §9.3: 30-45 min budget, daily cron.
# Manually re-runnable via workflow_dispatch (used to satisfy the
# acceptance criterion "vert au moins une fois" without waiting for cron).

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

# Least-privilege default for GITHUB_TOKEN; jobs only check out and read.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  backend-property-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HYPOTHESIS_PROFILE: nightly
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run pytest tests/unit/

  audit-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run --with pip-audit pip-audit

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run pytest --cov --cov-report=xml --cov-report=html --cov-report=term
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  # Placeholders surfaced in CI so the gap is visible; activated in V1
  # (cf. docs/Stratégie de tests §6 and §4.7).
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "placeholder — Playwright 5 parcours (V1, stratégie de tests §6)"

  banking-contract-level-c:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo "placeholder — Enable Banking niveau C live calls (V1, stratégie de tests §4.7)"

  # Boots the dev compose stack end-to-end and asserts the three runtime
  # acceptance criteria of S13.1 (boot without error, active replication slot,
  # PowerSync "connected") — the riskiest part of E13. Re-runnable via
  # workflow_dispatch. Local dev uses `podman compose`; CI uses `docker compose`
  # on the SAME compose.dev.yml.
  powersync-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      # Dev-only defaults (passwords match compose/initdb); fine for CI.
      - name: Materialise .env
        run: cp .env.example .env
      - name: Start Postgres (source + storage DB + roles + empty publication)
        run: docker compose -f compose.dev.yml up -d --wait postgres
      - name: Apply migrations (creates the app tables)
        env:
          DATABASE_URL: postgresql+asyncpg://prosperity:prosperity@localhost:5432/prosperity
        run: uv run alembic upgrade head
      - name: Populate the powersync publication
        run: |
          docker compose -f compose.dev.yml exec -T postgres \
            psql -U prosperity -d prosperity -v ON_ERROR_STOP=1 \
            < compose/initdb/10_powersync_publication.sql
      - name: Start PowerSync Service
        run: docker compose -f compose.dev.yml up -d --wait powersync
      - name: Smoke
        run: bash scripts/smoke_powersync.sh
      - name: Dump logs on completion
        if: always()
        # Mask `user:password@` in any connection URI the service logs at boot.
        # The CI credentials are dev-only, but this keeps the pattern correct for
        # when E16 runs this with real secrets.
        run: docker compose -f compose.dev.yml logs --no-color | sed -E 's#(://[^:/@]+:)[^@]+@#\1***@#g'
