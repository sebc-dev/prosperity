spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prosperity
    username: prosperity
    password: prosperity
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    jdbc:
      initialize-schema: never
      table-name: spring_session

server:
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30m}
      cookie:
        http-only: true
        same-site: lax
        secure: true
        name: SESSION

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
