<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prosperity</title>
    <!-- Anti-FOUC (D7) : applique `.dark` avant le mount React pour éviter un flash.
         Heuristique alignée sur readInitial() (theme-provider.tsx) : sombre par défaut
         sauf si l'utilisateur a explicitement choisi 'light' (décision #240). -->
    <script>
      try {
        if (localStorage.getItem('prosperity-theme') !== 'light')
          document.documentElement.classList.add('dark')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
