<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prosperity</title>
    <!-- Anti-FOUC (D7) : applique `.dark` avant le mount React pour éviter un flash
         clair→sombre. Script constant (aucune valeur localStorage interpolée → pas
         d'injection) ; à protéger par hash CSP quand une CSP arrivera (issue E14).
         Heuristique alignée sur readInitial() (theme-provider.tsx) : 'dark' → sombre,
         'light' → clair, toute autre valeur (absente ou corrompue) → préférence
         système. Évite un flash divergent du rendu React sur une clé corrompue. -->
    <script>
      try {
        var t = localStorage.getItem('prosperity-theme')
        if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
