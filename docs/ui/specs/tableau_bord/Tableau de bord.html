document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

600: #2A5358;   /* couleur du logo */\n    --teal-700: #224245;\n    --teal-800: #193133;\n    --teal-900: #112224;\n\n    /* ---- Primitives — Sable (le « papier ») --------------------------- */\n    --sand-50:  #FBF9F5;\n    --sand-100: #F6F2EB;\n    --sand-200: #EDE7DA;\n    --sand-300: #E0D8C8;\n    --sand-400: #CFC6B3;\n\n    /* ---- Primitives — Encre ------------------------------------------- */\n    --ink-900: #14262A;\n    --ink-700: #2E4042;\n    --ink-500: #6B7B7C;\n    --ink-400: #9BA9A6;\n\n    /* =====================================================================\n       Tokens sémantiques — à utiliser dans les composants\n       light-dark(<valeur claire>, <valeur sombre>)\n    ===================================================================== */\n\n    /* Surfaces & texte */\n    --color-bg:             light-dark(var(--sand-100), #0F1E20);\n    --color-surface:        light-dark(var(--sand-50),  #16302F);\n    --color-surface-raised: light-dark(#FFFFFF,         #1C3A38);\n    --color-border:         light-dark(#E7E0D4,         #284B49);\n    --color-border-strong:  light-dark(#D8CFBE,         #356360);\n\n    --color-text:           light-dark(var(--ink-900),  #E8EFEC);\n    --color-text-muted:     light-dark(var(--ink-500),  #94A8A5);\n    --color-text-subtle:    light-dark(var(--ink-400),  #6E8482);\n\n    /* Marque */\n    --color-primary:         light-dark(var(--teal-600), var(--teal-300));\n    --color-primary-hover:   light-dark(var(--teal-500), var(--teal-200));\n    --color-on-primary:      light-dark(var(--sand-50),  #0F1E20);\n    --color-primary-surface: light-dark(#E2EDEC,         #16302F);\n\n    /* --- Sémantique finance ------------------------------------------- */\n\n    /* Crédit / revenu / positif (feuille) */\n    --color-credit:         light-dark(#2F8F6A, #4FB389);\n    --color-credit-surface: light-dark(#E1F0E9, #14352A);\n    --color-credit-text:    light-dark(#1E6B4E, #9FE1CB);\n\n    /* Débit / dette / négatif (terre cuite) */\n    --color-debit:          light-dark(#BE5A40, #D87B5E);\n    --color-debit-surface:  light-dark(#F6E7E0, #3A241C);\n    --color-debit-text:     light-dark(#9A4127, #F0997B);\n\n    /* --- Les trois soldes ---------------------------------------------- */\n\n    /* Réel (certain) = sarcelle */\n    --color-real:           var(--color-primary);\n    --color-real-surface:   var(--color-primary-surface);\n\n    /* Prévisionnel (planifié) = sauge atténuée */\n    --color-forecast:         light-dark(#5C7060, #9CB3A3);\n    --color-forecast-surface: light-dark(#E8EDE7, #1E332B);\n    --color-forecast-text:    light-dark(#46584C, #C9D6CB);\n\n    /* Projeté (incertain) = ambre — à coupler avec une bordure pointillée */\n    --color-projected:         light-dark(#D49A3E, #E3B25C);\n    --color-projected-surface: light-dark(#F7EBD4, #3A2E16);\n    --color-projected-text:    light-dark(#85500B, #FAC775);\n  }\n\n  /* Mode forcé par l'utilisateur (toggle) */\n  [data-theme=\"light\"] { color-scheme: light; }\n  [data-theme=\"dark\"]  { color-scheme: dark; }\n}\n\n/* =============================================================================\n   Thème « Chêne » — Typographie\n   3 familles : Fraunces (serif, titres & montants clés), Nunito Sans (UI/corps),\n   JetBrains Mono (montants, données, chiffres tabulaires).\n============================================================================= */\n\n@layer tokens {\n  :root {\n    /* ---- Familles ----------------------------------------------------- */\n    --font-serif: 'Fraunces Variable', 'Fraunces', Georgia, serif;\n    --font-sans:  'Nunito Sans Variable', 'Nunito Sans', system-ui, sans-serif;\n    --font-mono:  'JetBrains Mono Variable', 'JetBrains Mono', ui-monospace, monospace;\n\n    /* ---- Échelle typographique (fluide-ready, base 16px) -------------- */\n    --text-xs:   0.75rem;   /* 12px — légendes, méta */\n    --text-sm:   0.875rem;  /* 14px — UI dense, labels */\n    --text-base: 1rem;      /* 16px — corps */\n    --text-md:   1.125rem;  /* 18px — corps large */\n    --text-lg:   1.375rem;  /* 22px — sous-titres */\n    --text-xl:   1.75rem;   /* 28px — titres de carte */\n    --text-2xl:  2.25rem;   /* 36px — titres de page */\n    --text-3xl:  3rem;      /* 48px — montants héros */\n    --text-4xl:  4rem;      /* 64px — display */\n\n    /* ---- Graisses ----------------------------------------------------- */\n    --weight-regular:  400;\n    --weight-medium:   500;\n    --weight-semibold: 600;\n    --weight-bold:     700;\n    --weight-black:    900;  /* Fraunces display */\n\n    /* ---- Interlignes -------------------------------------------------- */\n    --leading-tight:   1.1;\n    --leading-snug:    1.25;\n    --leading-normal:  1.5;\n    --leading-relaxed: 1.65;\n\n    /* ---- Optical size Fraunces ---------------------------------------- */\n    --fraunces-soft: 'opsz' 28, 'SOFT' 40, 'WONK' 0; /* @kind font */\n  }\n\n  /* =====================================================================\n     Helper indispensable : montants alignés (chiffres tabulaires)\n     <span class=\"amount\">+2 450,00 €<\u002Fspan>\n     Accessibilité : la polarité ne repose JAMAIS sur la seule couleur.\n     Toujours conserver le signe +/− (et l'alignement) en plus du token.\n  ===================================================================== */\n  .amount {\n    font-family: var(--font-mono);\n    font-variant-numeric: tabular-nums;\n    letter-spacing: -0.01em;\n  }\n}\n\n/* =============================================================================\n   Thème « Chêne » — Rayons, ombres, espacement\n============================================================================= */\n\n@layer tokens {\n  :root {\n    /* ---- Rayons ------------------------------------------------------- */\n    --radius-sm:   8px;\n    --radius-md:  10px;\n    --radius-lg:  14px;\n    --radius-pill: 999px;\n\n    /* ---- Ombres douces ------------------------------------------------ */\n    --shadow-sm: 0 1px 2px  light-dark(rgba(20,38,42,.06), rgba(0,0,0,.35));\n    --shadow-md: 0 4px 16px light-dark(rgba(20,38,42,.08), rgba(0,0,0,.45));\n    --shadow-lg: 0 12px 32px light-dark(rgba(20,38,42,.12), rgba(0,0,0,.55));\n\n    /* ---- Espacement (base 4px) --------------------------------------- */\n    --space-1:  4px;\n    --space-2:  8px;\n    --space-3:  12px;\n    --space-4:  16px;\n    --space-5:  20px;\n    --space-6:  24px;\n    --space-8:  32px;\n    --space-10: 40px;\n    --space-12: 48px;\n    --space-16: 64px;\n\n    /* ---- Largeurs de trait ------------------------------------------- */\n    --border-thin: 1px;\n    --border-med:  1.5px;\n\n    /* ---- Transitions -------------------------------------------------- */\n    --ease-soft: cubic-bezier(.32, .72, .35, 1); /* @kind other */\n    --dur-fast:  120ms; /* @kind other */\n    --dur-base:  200ms; /* @kind other */\n  }\n}\n\n/* =============================================================================\n   Chêne ↔ shadcn/ui — couche de compatibilité\n   -----------------------------------------------------------------------------\n   Mappe les NOMS de tokens shadcn (« new-york / neutral ») sur les tokens\n   sémantiques Chêne. Aucune couleur en dur : changer un token Chêne re-thème\n   automatiquement les noms shadcn. Permet aux écrans Prosperity (MVP) d'utiliser\n   le vocabulaire shadcn tout en gardant l'esthétique Chêne (sarcelle / sable).\n   Valeurs « provisoires » au sens de l'issue #240 : la structure est stable.\n============================================================================= */\n\n@layer tokens {\n  :root {\n    /* ---- Surfaces & texte (shadcn) ----------------------------------- */\n    --background:            var(--color-bg);\n    --foreground:            var(--color-text);\n    --card:                  var(--color-surface-raised);\n    --card-foreground:       var(--color-text);\n    --popover:               var(--color-surface-raised);\n    --popover-foreground:    var(--color-text);\n\n    /* ---- Marque ------------------------------------------------------- */\n    --primary:               var(--color-primary);\n    --primary-foreground:    var(--color-on-primary);\n    --secondary:             var(--color-primary-surface);\n    --secondary-foreground:  var(--color-primary);\n    --accent:                var(--color-primary-surface);\n    --accent-foreground:     var(--color-primary);\n\n    /* ---- Atténué ------------------------------------------------------ */\n    --muted:                 var(--color-surface);\n    --muted-foreground:      var(--color-text-muted);\n\n    /* ---- Destructif --------------------------------------------------- */\n    --destructive:           var(--color-debit);\n    --destructive-foreground: var(--color-on-primary);\n\n    /* ---- Lignes & focus ----------------------------------------------- */\n    --border:                var(--color-border);\n    --input:                 var(--color-border-strong);\n    --ring:                  var(--color-primary);\n\n    /* ---- Rayon shadcn ------------------------------------------------- */\n    --radius:                var(--radius-md);\n\n    /* =====================================================================\n       Couleurs SÉMANTIQUES MÉTIER (design-system.md §1)\n       À utiliser via ces alias, jamais en dur. Toujours doubler la couleur\n       d'une icône / d'un libellé / d'un signe (accessibilité daltonisme).\n    ===================================================================== */\n\n    /* Positif · à jour · crédit (✓ vert feuille) */\n    --success:               var(--color-credit);\n    --success-foreground:    var(--color-credit-text);\n    --success-surface:       var(--color-credit-surface);\n\n    /* Attention · budget ≥ 80 % (⚠ ambre) */\n    --warning:               var(--color-projected);\n    --warning-foreground:    var(--color-projected-text);\n    --warning-surface:       var(--color-projected-surface);\n\n    /* Danger · dépassement > 100 % · dette (terre cuite) */\n    --danger:                var(--color-debit);\n    --danger-foreground:     var(--color-debit-text);\n    --danger-surface:        var(--color-debit-surface);\n\n    /* Information · neutre marque (sarcelle) */\n    --info:                  var(--color-primary);\n    --info-foreground:       var(--color-primary);\n    --info-surface:          var(--color-primary-surface);\n  }\n}\n\n<\u002Fstyle>\n  <script src=\"e122faf9-4428-4cb5-bdaa-e983f9c2770c\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box;}\n    body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);}\n    a{color:inherit;}\n    .app-page{min-height:100vh;display:flex;flex-direction:column;}\n    .app-header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;padding:13px 26px;background:var(--color-surface-raised);border-bottom:1px solid var(--color-border);}\n    .app-shell{display:flex;flex:1;min-height:0;}\n    .app-sidebar{width:256px;flex:0 0 256px;border-right:1px solid var(--color-border);padding:18px 14px;position:sticky;top:57px;align-self:flex-start;height:calc(100vh - 57px);overflow:auto;}\n    .app-main{flex:1;min-width:0;padding:28px 30px 40px;}\n    .bottom-nav{display:none;}\n\n    .dash{display:flex;flex-direction:column;gap:22px;}\n    .row2{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:stretch;}\n    @media(max-width:880px){ .row2{grid-template-columns:1fr;} }\n    .eqcard{display:flex;flex-direction:column;height:100%;}\n    .eqcard > div{flex:1;display:flex;flex-direction:column;min-height:0;}\n\n    /* Carrousel comptes */\n    .accts-track{display:flex;gap:16px;}\n    .accts-track::-webkit-scrollbar{height:0;}\n    .accts-track .acct-card{flex:1 1 0;min-width:0;}\n    .accts-track.is-carousel{overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:4px;}\n    .accts-track.is-carousel .acct-card{flex:0 0 86%;scroll-snap-align:center;}\n    .acct-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:15px 16px;display:flex;flex-direction:column;}\n    .acar-prev,.acar-next{display:none;position:absolute;top:34%;width:34px;height:34px;border-radius:50%;border:1px solid var(--color-border);background:var(--color-surface-raised);color:var(--color-text);cursor:pointer;place-items:center;z-index:5;box-shadow:var(--shadow-sm);font-size:18px;line-height:1;}\n    .acar-prev{left:-7px;}.acar-next{right:-7px;}\n    .acar-dots{display:none;justify-content:center;gap:6px;margin-top:13px;}\n    .acar-dots [data-dot]{height:7px;width:7px;border-radius:999px;border:none;background:var(--color-primary);opacity:.35;cursor:pointer;padding:0;transition:width .2s,opacity .2s;}\n    .accts-track.is-carousel ~ .acar-prev,.accts-track.is-carousel ~ .acar-next{display:grid;}\n    .accts-track.is-carousel ~ .acar-dots{display:flex;}\n    @media(max-width:767px){\n      .accts-track{overflow-x:auto;scroll-snap-type:x mandatory;}\n      .accts-track .acct-card{flex:0 0 86%;scroll-snap-align:center;}\n      #balance-carousel .acar-prev,#balance-carousel .acar-next{display:grid;}\n      #balance-carousel .acar-dots{display:flex;}\n    }\n\n    @media(max-width:767px){\n      .app-sidebar{display:none;}\n      .app-main{padding:20px 16px 88px;}\n      .app-header{padding:11px 16px;}\n      .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:30;justify-content:space-between;gap:2px;background:var(--color-surface-raised);border-top:1px solid var(--color-border);padding:7px 6px calc(7px + env(safe-area-inset-bottom));}\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"app-page\">\n\n  <!-- ============ HEADER ============ -->\n  <header class=\"app-header\">\n    <img src=\"f61abcc8-5365-467d-83e3-abbc991efc22\" width=\"30\" height=\"30\" alt=\"\">\n    <span style=\"font-family:var(--font-serif);font-size:21px;font-weight:600;le ly:var(--font-serif);font-size:17px;font-weight:600;\">Transactions récentes<\u002Fh3>\n            <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:3px;color:var(--color-primary);font-size:13px;font-weight:700;text-decoration:none;\">Tout voir <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.Icon\" name=\"chevron-right\" size=\"15\" color=\"var(--color-primary)\" hint-size=\"15px,15px\"><\u002Fx-import><\u002Fa>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isLoaded }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <div>\n                <sc-for list=\"{{ tx }}\" as=\"t\" hint-placeholder-count=\"8\">\n                  <a href=\"#\" style=\"display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--color-border);text-decoration:none;color:inherit;\">\n                    <span style=\"font-size:12.5px;color:var(--color-text-muted);font-variant-numeric:tabular-nums;flex:0 0 auto;width:42px;\">{{ t.date }}<\u002Fspan>\n                    <span style=\"flex:1;min-width:0;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ t.payee }}<\u002Fspan>\n                    <span style=\"flex:0 0 auto;\">\n                      <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.CategoryChip\" name=\"{{ t.cat.name }}\" color=\"{{ t.cat.color }}\" icon=\"{{ t.cat.icon }}\" size=\"sm\" hint-size=\"120px,24px\"><\u002Fx-import>\n                    <\u002Fspan>\n                    <span style=\"flex:0 0 auto;width:108px;text-align:right;\">\n                      <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.MoneyAmount\" cents=\"{{ t.cents }}\" signed=\"{{ true }}\" semantic=\"auto\" size=\"md\" align=\"right\" hint-size=\"100px,20px\"><\u002Fx-import>\n                    <\u002Fspan>\n                    <span style=\"flex:0 0 auto;width:104px;display:flex;justify-content:flex-end;\">\n                      <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.StateBadge\" state=\"{{ t.state }}\" hint-size=\"92px,22px\"><\u002Fx-import>\n                    <\u002Fspan>\n                  <\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"padding:14px 18px;\">\n                <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.Button\" variant=\"secondary\" full=\"{{ true }}\" hint-size=\"100%,42px\">Voir toutes les transactions<\u002Fx-import>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:8px 4px;\">\n              <sc-for list=\"{{ skel8 }}\" as=\"s\" hint-placeholder-count=\"6\">\n                <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.SkeletonRow\" hint-size=\"100%,62px\"><\u002Fx-import>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:38px 24px;text-align:center;\">\n              <span style=\"display:inline-grid;place-items:center;width:52px;height:52px;border-radius:var(--radius-lg);background:var(--color-primary-surface);margin-bottom:10px;\">\n                <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.Icon\" name=\"arrow-left-right\" size=\"24\" color=\"var(--color-primary)\" hint-size=\"24px,24px\"><\u002Fx-import>\n              <\u002Fspan>\n              <div style=\"font-family:var(--font-serif);font-size:16px;font-weight:600;\">Aucune transaction<\u002Fdiv>\n              <p style=\"margin:6px auto 14px;max-width:260px;font-size:13px;color:var(--color-text-muted);line-height:1.5;\">Saisissez une première opération pour démarrer le suivi.<\u002Fp>\n              <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.Button\" variant=\"primary\" size=\"sm\" hint-size=\"170px,36px\">Ajouter une transaction<\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fx-import>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- ============ BOTTOM NAV (mobile) ============ -->\n  <nav class=\"bottom-nav\">\n    <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"7\">\n      <a href=\"#\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;min-height:44px;justify-content:center;text-decoration:none;font-size:9.5px;font-weight:600;color:{{ item.iconColor }};\">\n        <x-import component-from-global-scope=\"ChNeDesignSystem_02fc6e.Icon\" name=\"{{ item.icon }}\" size=\"20\" color=\"{{ item.iconColor }}\" hint-size=\"20px,20px\"><\u002Fx-import>\n        {{ item.shortLabel }}\n      <\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;screenState&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;peuplé&quot;,&quot;chargement&quot;,&quot;vide&quot;],&quot;default&quot;:&quot;peuplé&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Démo&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;auto&quot;,&quot;clair&quot;,&quot;sombre&quot;],&quot;default&quot;:&quot;auto&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Démo&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this.applyTheme();\n    this.reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.autoTimer = setInterval(() => this.autoRotate(), 4000);\n    this.ensureWired();\n  }\n  componentDidUpdate() { this.applyTheme(); this.ensureWired(); }\n  componentWillUnmount() { if (this.autoTimer) clearInterval(this.autoTimer); }\n\n  applyTheme() {\n    const t = this.props.theme || 'auto';\n    const el = document.documentElement;\n    if (t === 'clair') el.setAttribute('data-theme', 'light');\n    else if (t === 'sombre') el.setAttribute('data-theme', 'dark');\n    else el.removeAttribute('data-theme');\n  }\n\n  // ---- Carrousel comptes (offline-first : pas de display:none) ----\n  carEl() {\n    const wrap = document.getElementById('balance-carousel');\n    if (!wrap) return null;\n    return { wrap, track: wrap.querySelector('[data-track]') };\n  }\n  ensureWired() {\n    const c = this.carEl();\n    if (!c || !c.track || c.track.__wired) return;\n    c.track.__wired = true;\n    const pause = (v) => () => { this.paused = v; };\n    c.wrap.addEventListener('mouseenter', pause(true));\n    c.wrap.addEventListener('mouseleave', pause(false));\n    c.wrap.addEventListener('focusin', pause(true));\n    c.wrap.addEventListener('focusout', pause(false));\n    c.track.addEventListener('scroll', () => this.syncDots(), { passive: true });\n    this.syncDots();\n  }\n  active(track) { return track && (track.scrollWidth - track.clientWidth > 4); }\n  step(track) {\n    const cards = [...track.children];\n    if (!cards.length) return 0;\n    return cards[0].getBoundingClientRect().width + 16;\n  }\n  autoRotate() {\n    const c = this.carEl();\n    if (!c || !c.track || !this.active(c.track) || this.paused || this.reduce) return;\n    const w = this.step(c.track);\n    const n = [...c.track.children].length;\n    let next = Math.round(c.track.scrollLeft / w) + 1;\n    if (next >= n) next = 0;\n    c.track.scrollTo({ left: next * w, behavior: 'smooth' });\n  }\n  nudge(dir) {\n    const c = this.carEl();\n    if (!c || !c.track) return;\n    const w = this.step(c.track);\n    const n = [...c.track.children].length;\n    let next = Math.round(c.track.scrollLeft / w) + dir;\n    next = Math.max(0, Math.min(n - 1, next));\n    c.track.scrollTo({ left: next * w, behavior: 'smooth' });\n  }\n  goTo(i) {\n    const c = this.carEl();\n    if (!c || !c.track) return;\n    c.track.scrollTo({ left: i * this.step(c.track), behavior: 'smooth' });\n  }\n  syncDots() {\n    const c = this.carEl();\n    if (!c || !c.track) return;\n    const dots = [...c.wrap.querySelectorAll('[data-dot]')];\n    if (!dots.length) return;\n    const i = Math.round(c.track.scrollLeft / this.step(c.track));\n    dots.forEach((d, k) => {\n      d.style.opacity = k === i ? '1' : '0.35';\n      d.style.width = k === i ? '18px' : '7px';\n    });\n  }\n\n  fmt(cents) {\n    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(cents / 100);\n  }\n\n  renderVals() {\n    const state = this.props.screenState || 'peuplé';\n    const isLoading = state === 'chargement';\n    const isEmpty = state === 'vide';\n    const isLoaded = !isLoading && !isEmpty;\n\n    const navDefs = [\n      { label: 'Tableau de bord', short: 'Accueil', icon: 'layout-dashboard', active: true },\n      { label: 'Comptes', short: 'Comptes', icon: 'wallet', active: false },\n      { label: 'Transactions', short: 'Opér.', icon: 'arrow-left-right', active: false },\n      { label: 'Budgets', short: 'Budgets', icon: 'piggy-bank', active: false },\n      { label: 'Dettes', short: 'Dettes', icon: 'hand-coins', active: false },\n      { label: 'Catégories', short: 'Catég.', icon: 'tags', active: false },\n      { label: 'Réglages', short: 'Réglages', icon: 'settings', active: false },\n    ];\n    const nav = navDefs.map((n) => ({\n      label: n.label,\n      shortLabel: n.short,\n      icon: n.icon,\n      iconColor: n.active ? 'var(--color-primary)' : 'var(--color-text-muted)',\n      rowStyle: n.active\n        ? 'background:var(--color-primary-surface);color:var(--color-primary);'\n        : 'background:transparent;color:var(--color-text);',\n    }));\n\n    // ---- Comptes : 2 soldes seulement (actuel + creux avant paie | objectif) ----\n    // Helpers pour le 2e solde :\n    const creux = (cents, jour, seuil) => {\n      const danger = cents < (seuil ?? 0);\n      return {\n        kind: 'creux', isCreux: true, isObjectif: false,\n        label: `Creux avant paie (le ${jour})`,\n        cents, semantic: danger ? 'danger' : 'neutral',\n        danger,\n        labelColor: danger ? 'var(--danger-foreground)' : 'var(--color-text-muted)',\n        boxStyle: danger\n          ? 'background:var(--color-debit-surface);margin:0 -16px -15px;padding-left:16px;padding-right:16px;padding-bottom:15px;border-radius:0 0 var(--radius-lg) var(--radius-lg);'\n          : '',\n      };\n    };\n    const objectif = (pct) => ({\n      kind: 'objectif', isCreux: false, isObjectif: true,\n      label: 'Objectif', danger: false,\n      goalWidth: Math.min(pct, 100), pctLabel: pct + ' %',\n      labelColor: 'var(--color-text-muted)', boxStyle: '',\n    });\n\n    const accounts = [\n      {\n        name: 'Compte courant', type: 'Courant', icon: 'wallet', actuel: 123456,\n        second: creux(-6000, 27, 0), // creux sous le seuil → danger\n        fresh: { icon: 'landmark', text: 'banque · il y a 5 h' },\n      },\n      {\n        name: 'Compte commun', type: 'Commun', icon: 'users', actuel: 89000,\n        second: creux(21000, 2, 0), // creux au-dessus du seuil → neutre\n        fresh: { icon: 'refresh-cw', text: \"synchronisé à l'instant\" },\n      },\n      {\n        name: 'Livret A', type: 'Épargne', icon: 'piggy-bank', actuel: 560000,\n        second: objectif(58), // épargne → objectif, pas de creux\n        fresh: { icon: 'file-down', text: 'OFX · importé le 26/06' },\n      },\n    ];\n\n    const dots = accounts.map((_, i) => ({ onClick: () => this.goTo(i) }));\n    const acctsTrackClass = accounts.length > 3 ? 'is-carousel' : '';\n\n    // ---- Dettes : barres divergentes par contrepartie ----\n    // (personne OU compte commun ; net nul exclu ; top 4 par |montant|)\n    const eurAbs = (c) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(Math.abs(c) / 100);\n    const initialsOf = (n) => n.split(/\\s+/).filter(Boolean).slice(0, 2).map((w) => w[0].toUpperCase()).join('');\n    const rawDebts = [\n      { name: 'Compte commun', cents: -12000, commun: true },\n      { name: 'Sami', cents: 8000 },\n      { name: 'Alice', cents: -5000 },\n      { name: 'Bob', cents: 2000 },\n    ];\n    const visibleDebts = rawDebts\n      .filter((d) => d.cents !== 0)\n      .sort((a, b) => Math.abs(b.cents) - Math.abs(a.cents))\n      .slice(0, 4);\n    const maxAbs = Math.max(1, ...visibleDebts.map((d) => Math.abs(d.cents)));\n    const net = rawDebts.reduce((s, d) => s + d.cents, 0);\n    const netSens = net < 0 ? 'vous devez, au total' : net > 0 ? 'on vous doit, au total' : \"à l'équilibre\";\n    const debts = visibleDebts.map((d) => {\n      const neg = d.cents < 0;\n      const w = ((Math.abs(d.cents) / maxAbs) * 46).toFixed(2); // % d'un demi-côté\n      const fill = neg ? '#D85A30' : '#1D9E75';\n      const barStyle = neg\n        ? `position:absolute;top:5px;bottom:5px;right:50%;width:max(4px, ${w}%);background:${fill};border-radius:3px 0 0 3px;`\n        : `position:absolute;top:5px;bottom:5px;left:50%;width:max(4px, ${w}%);background:${fill};border-radius:0 3px 3px 0;`;\n      const sens = d.commun\n        ? (neg ? 'vous devez au commun' : 'le commun vous doit')\n        : (neg ? 'vous devez' : 'on vous doit');\n      const aria = d.commun\n        ? (neg ? `Vous devez ${eurAbs(d.cents)} au compte commun` : `Le compte commun vous doit ${eurAbs(d.cents)}`)\n        : (neg ? `Vous devez ${eurAbs(d.cents)} à ${d.name}` : `${d.name} vous doit ${eurAbs(d.cents)}`);\n      return {\n        name: d.name, cents: d.cents,\n        isCommun: !!d.commun, isPerson: !d.commun,\n        initials: initialsOf(d.name), sens,\n        sensColor: neg ? 'var(--color-debit-text)' : 'var(--color-credit-text)',\n        barStyle, aria,\n      };\n    });\n\n    // ---- Budgets : top 3 au plus fort taux de consommation ----\n    const rawBudgets = [\n      { name: 'Courses', icon: 'shopping-cart', color: '#C2703D', spent: 24500, alloc: 30000 },\n      { name: 'Restaurants', icon: 'utensils', color: '#B0843A', spent: 21000, alloc: 20000 },\n      { name: 'Loisirs', icon: 'music', color: '#5A8A8D', spent: 9000, alloc: 30000 },\n      { name: 'Transports', icon: 'car', color: '#BE5A40', spent: 6800, alloc: 18000 },\n    ];\n    const budgets = rawBudgets\n      .map((b) => {\n        const pct = Math.round((b.spent / b.alloc) * 100);\n        const over = pct > 100;\n        const warn = pct >= 80 && !over;\n        return {\n          name: b.name, icon: b.icon, color: b.color, pct,\n          width: Math.min(pct, 100),\n          pctLabel: pct + ' %',\n          barColor: over ? 'var(--danger)' : warn ? 'var(--warning)' : 'var(--color-primary)',\n          statusColor: over ? 'var(--danger-foreground)' : warn ? 'var(--warning-foreground)' : 'var(--color-text-muted)',\n          statusIcon: over ? 'triangle-alert' : warn ? 'triangle-alert' : 'circle-check',\n          caption: over ? 'dépassement' : warn ? 'attention' : 'dans le budget',\n          spentLabel: this.fmt(b.spent), allocLabel: this.fmt(b.alloc),\n        };\n      })\n      .sort((a, b) => b.pct - a.pct)\n      .slice(0, 3);\n\n    // ---- Transactions : 8 dernières, pas de scroll ----\n    const C = {\n      courses: { name: 'Courses', color: '#C2703D', icon: 'shopping-cart' },\n      revenus: { name: 'Revenus', color: '#2F8F6A', icon: 'briefcase' },\n      logement: { name: 'Logement', color: '#2A5358', icon: 'house' },\n      factures: { name: 'Factures', color: '#D49A3E', icon: 'receipt' },\n      loisirs: { name: 'Loisirs', color: '#5A8A8D', icon: 'music' },\n      transports: { name: 'Transports', color: '#BE5A40', icon: 'car' },\n      restaurants: { name: 'Restaurants', color: '#B0843A', icon: 'utensils' },\n      sante: { name: 'Santé', color: '#9A6A52', icon: 'heart-pulse' },\n    };\n    const tx = [\n      { date: '15/06', payee: 'Carrefour', cat: C.courses, cents: -4500, state: 'confirmed' },\n      { date: '14/06', payee: 'Salaire — Léa', cat: C.revenus, cents: 200000, state: 'confirmed' },\n      { date: '13/06', payee: 'Loyer juin', cat: C.logement, cents: -118000, state: 'confirmed' },\n      { date: '12/06', payee: 'EDF', cat: C.factures, cents: -8990, state: 'confirmed' },\n      { date: '11/06', payee: 'Cinéma Pathé', cat: C.loisirs, cents: -2400, state: 'confirmed' },\n      { date: '10/06', payee: 'SNCF — Paris-Lyon', cat: C.transports, cents: -5640, state: 'confirmed' },\n      { date: '09/06', payee: 'Le Petit Bistrot', cat: C.restaurants, cents: -6200, state: 'planned' },\n      { date: '08/06', payee: 'Pharmacie Centrale', cat: C.sante, cents: -1830, state: 'planned' },\n    ];\n\n    return {\n      nav, accounts, dots, acctsTrackClass, debts, net, netSens, budgets, tx,\n      isLoading, isEmpty, isLoaded,\n      skel: [1, 2, 3], skel8: [1, 2, 3, 4, 5, 6],\n      carPrev: () => this.nudge(-1),\n      carNext: () => this.nudge(1),\n      toggleTheme: () => {\n        const el = document.documentElement;\n        el.setAttribute('data-theme', el.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
