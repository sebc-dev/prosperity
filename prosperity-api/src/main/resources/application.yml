server:
  port: 8080

spring:
  application:
    name: prosperity-api

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prosperity}
    username: ${DB_USERNAME:prosperity}
    password: ${DB_PASSWORD:prosperity}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiry: 900
    refresh-expiry: 2592000

management:
  endpoints:
    web:
      exposure:
        include: health,info
